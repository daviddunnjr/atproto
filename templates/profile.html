<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>My Profile</title>
</head>
<body>
    <nav class="left"><button onclick="window.location.href='/edit_profile'">Edit Profile</button></nav>
    <main>
    <img class="banner" src="{{ profile.banner }}" alt="Banner" />
    <div class="profile">
        {% if profile.avatar %}
        <img class="avatar" src="{{ profile.avatar }}" alt="Avatar" />
        {% endif %}
        <div class="profile-info">
        <h1 class="displayname">{{ profile.display_name or 'No Display Name' }}</h1>
        <p class="handle">{{ profile.handle }}</p>
        <p class="bio">{{ profile.description or 'No description' }}</p>
        <p class="did">{{ profile.did }}</p>
        </div>
    </div>
    {% if is_own_profile %}
    <div class="new-post">
        <form method="POST" action="/new_post" id="postForm">
            <textarea name="text" id="postTextarea" placeholder="What's on your mind?" required></textarea>
            <div class="post-controls">
                <span class="char-count"><span id="charCount">0</span>/300</span>
                <button type="submit" id="postButton">Post</button>
            </div>
        </form>
    </div>
    <script>
        const textarea = document.getElementById('postTextarea');
        const charCount = document.getElementById('charCount');
        const postButton = document.getElementById('postButton');
        const MAX_CHARS = 300;

        textarea.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = length;
            
            if (length > MAX_CHARS) {
                postButton.disabled = true;
                charCount.parentElement.classList.add('over-limit');
            } else {
                postButton.disabled = false;
                charCount.parentElement.classList.remove('over-limit');
            }
        });
    </script>
    {% endif %}
    <div class="posts">
        {% for post in posts %}
        {% include 'post_item.html' %}
        {% endfor %}
    </div>
    </main>
</body>
</html>
